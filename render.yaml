services:
  - type: web
    name: roblox-api-server
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPEN_CLOUD_API_KEY
        sync: false
      - key: ROBLOX_SECRET
        sync: false
